events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Rate Limiting (요청 속도 제한) 설정: 10MB 메모리에 IP 저장, 초당 10회 요청 제한
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # 로그 포맷 정의 - API 응답 속도 포함
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # 상세 로그 포맷 - 응답 시간, 업스트림 응답 시간 포함
    log_format detailed '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';

    # 액세스 로그 설정
    access_log /var/log/nginx/access.log detailed;

    # 에러 로그 설정
    error_log /var/log/nginx/error.log warn;

    upstream api_backend {
        server newsletter-api:8080;
    }

    # HTTP 서버 (80 포트)
    server {
        listen 80;
        server_name _;

        # /walkthroughs → /walkthroughs/ 리다이렉트
        location = /walkthroughs {
            return 301 /walkthroughs/;
        }

        # 정적 페이지 서빙 (/walkthroughs/)
        location /walkthroughs/ {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /walkthroughs/index.html;
        }

        # Swagger UI 접근
        location /swagger-ui/ {
            proxy_pass http://api_backend/swagger-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # Swagger API docs 접근
        location /v3/api-docs {
            proxy_pass http://api_backend/v3/api-docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Swagger 리소스 접근 (CSS, JS 등)
        location /swagger-ui.html {
            proxy_pass http://api_backend/swagger-ui.html;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API 서버로 프록시
        location /api/ {
            # Rate Limiting 적용: 초과 요청에 대해 20개까지는 큐에 담아두고(burst), 초과분은 즉시(nodelay) 503 에러 처리
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://api_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS 설정
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

            # OPTIONS 요청 처리
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # 글로벌 헬스체크 엔드포인트
        location /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"UP"}';
        }

        # 헬스체크 엔드포인트
        location /api/health {
            proxy_pass http://api_backend/health;
            access_log off;
        }
    }
}
