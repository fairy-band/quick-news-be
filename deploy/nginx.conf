events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Rate Limiting (요청 속도 제한) 설정: 10MB 메모리에 IP 저장, 초당 10회 요청 제한
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=share_limit:10m rate=5r/s;
    limit_req_status 429;

    # 로그 포맷 정의 - API 응답 속도 포함
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # 상세 로그 포맷 - 응답 시간, 업스트림 응답 시간 포함
    log_format detailed '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';

    # 액세스 로그 설정
    access_log /var/log/nginx/access.log detailed;

    # 에러 로그 설정
    error_log /var/log/nginx/error.log warn;

    upstream api_backend {
        server newsletter-api:8080;
        keepalive 16;
    }

    # HTTP 서버 (80 포트)
    server {
        listen 80;
        server_name _;

        proxy_http_version 1.1;
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 서비스와 무관한 자동 스캔 요청은 정적 파일 조회/백엔드 프록시 전에 차단
        location ~* ^/(?:\.env|\.git|sdk/|wp-|wordpress|phpmyadmin|boaform|vendor|cgi-bin|config|admin|.*\.php$) {
            access_log off;
            return 444;
        }

        # 루트/파비콘 요청이 기본 정적 루트 에러 로그를 만들지 않도록 명시 처리
        location = / {
            return 404;
        }

        location = /favicon.ico {
            access_log off;
            return 204;
        }

        # /walkthroughs → /walkthroughs/ 리다이렉트
        location = /walkthroughs {
            return 301 /walkthroughs/;
        }

        # 정적 자산 캐시
        location ~ ^/walkthroughs/.+\.(?:css|js|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=3600, must-revalidate" always;
            try_files $uri =404;
        }

        # 정적 페이지 서빙 (/walkthroughs/)
        location /walkthroughs/ {
            root /usr/share/nginx/html;
            index index.html;
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /walkthroughs/index.html;
        }

        # Swagger UI 접근
        location /swagger-ui/ {
            proxy_pass http://api_backend/swagger-ui/;
            proxy_redirect off;
        }

        # Swagger API docs 접근
        location /v3/api-docs {
            proxy_pass http://api_backend/v3/api-docs;
        }

        # Swagger 리소스 접근 (CSS, JS 등)
        location /swagger-ui.html {
            proxy_pass http://api_backend/swagger-ui.html;
        }

        # OG 이미지 등 공개 공유 리소스
        location /share/ {
            limit_req zone=share_limit burst=20 nodelay;

            proxy_pass http://api_backend/share/;
        }

        # API 서버로 프록시
        location /api/ {
            # Rate Limiting 적용: 초과 요청에 대해 20개까지는 큐에 담아두고(burst), 초과분은 즉시(nodelay) 503 에러 처리
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://api_backend/api/;

            # CORS 설정
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

            # OPTIONS 요청 처리
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # 글로벌 헬스체크 엔드포인트
        location /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"UP"}';
        }

        # 헬스체크 엔드포인트
        location /api/health {
            proxy_pass http://api_backend/health;
            access_log off;
        }
    }
}
