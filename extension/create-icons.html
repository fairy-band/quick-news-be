<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>아이콘 생성기</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    canvas {
      border: 1px solid #ddd;
      margin: 10px;
    }
    .icon-container {
      display: flex;
      gap: 20px;
      margin: 20px 0;
    }
    button {
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #45a049;
    }
    .instructions {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 4px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Newsletter Content Saver - 아이콘 생성</h1>
  
  <div class="icon-container">
    <div>
      <h3>16x16</h3>
      <canvas id="icon16" width="16" height="16"></canvas>
      <br>
      <button onclick="downloadIcon('icon16', 16)">다운로드</button>
    </div>
    <div>
      <h3>48x48</h3>
      <canvas id="icon48" width="48" height="48"></canvas>
      <br>
      <button onclick="downloadIcon('icon48', 48)">다운로드</button>
    </div>
    <div>
      <h3>128x128</h3>
      <canvas id="icon128" width="128" height="128"></canvas>
      <br>
      <button onclick="downloadIcon('icon128', 128)">다운로드</button>
    </div>
  </div>
  
  <div class="instructions">
    <h3>사용 방법</h3>
    <ol>
      <li>이 HTML 파일을 브라우저에서 엽니다</li>
      <li>각 크기별로 "다운로드" 버튼을 클릭합니다</li>
      <li>다운로드된 파일을 <code>extension/icons/</code> 폴더에 저장합니다</li>
      <li>파일명을 각각 <code>icon16.png</code>, <code>icon48.png</code>, <code>icon128.png</code>으로 변경합니다</li>
    </ol>
  </div>

  <script>
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      
      // 배경
      ctx.fillStyle = '#4CAF50';
      ctx.fillRect(0, 0, size, size);
      
      // 둥근 모서리 효과
      const radius = size * 0.15;
      ctx.clearRect(0, 0, size, size);
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fillStyle = '#4CAF50';
      ctx.fill();
      
      // 문서 아이콘
      ctx.fillStyle = 'white';
      const lineHeight = size * 0.06;
      const lineWidth = size * 0.5;
      const startX = size * 0.25;
      const startY = size * 0.3;
      const gap = size * 0.15;
      
      // 세 줄의 선
      ctx.fillRect(startX, startY, lineWidth, lineHeight);
      ctx.fillRect(startX, startY + gap, lineWidth, lineHeight);
      ctx.fillRect(startX, startY + gap * 2, lineWidth * 0.75, lineHeight);
      
      // 체크 마크
      const checkSize = size * 0.12;
      const checkX = size * 0.75;
      const checkY = size * 0.65;
      
      ctx.beginPath();
      ctx.arc(checkX, checkY, checkSize, 0, Math.PI * 2);
      ctx.fillStyle = 'white';
      ctx.fill();
      
      ctx.strokeStyle = '#4CAF50';
      ctx.lineWidth = size * 0.02;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(checkX - checkSize * 0.4, checkY);
      ctx.lineTo(checkX - checkSize * 0.1, checkY + checkSize * 0.3);
      ctx.lineTo(checkX + checkSize * 0.4, checkY - checkSize * 0.3);
      ctx.stroke();
    }
    
    function downloadIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
    
    // 페이지 로드 시 아이콘 그리기
    window.onload = function() {
      drawIcon(document.getElementById('icon16'), 16);
      drawIcon(document.getElementById('icon48'), 48);
      drawIcon(document.getElementById('icon128'), 128);
    };
  </script>
</body>
</html>
